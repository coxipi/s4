defaults:
  - hydra: default
  - _self_

save_dir: "logs/"
seed: 1

logger:
  _target_: lightning.pytorch.loggers.WandbLogger
  entity: guillaume-rabusseau
  project: s4-drnn-lmnist
  name: ${now:%Y-%m-%d}_${now:%H-%M-%S}
  save_dir: ${save_dir}
  offline: False
  # tags:
  #   - "exp1_p8_seeds"

dataset: 
  name: mnist  # other choice: cifar
  grayscale: true # only true makes sense for mnist

# Dataset switch allows to keep using a single config file. Parameters below 
# are constrained given the dataset, don't change them.
dataset_specs:
  mnist: 
    datamodule_target: dataset.MNISTDataModule
    d_input: 1
    d_output: 10
  cifar: 
    datamodule_target: dataset.CIFAR10DataModule
    d_input: ${ifelse:${dataset.grayscale},1,3}
    d_output: 10

datamodule:
  _target_: ${dataset_specs.${dataset.name}.datamodule_target}
  batch_size: 64
  num_workers: 4
  val_split: 0.1 
  grayscale: ${dataset.grayscale}

trainer:
  max_epochs: 100
  enable_progress_bar: true
  log_every_n_steps: 1
  limit_train_batches: 1.0
  # accelerator: "cpu"
  accelerator: "auto" # reflects the behaviour of S4 which uses cuda if available

callbacks:
  early_stopping:
    _target_: lightning.pytorch.callbacks.EarlyStopping
    monitor: val_loss
    patience: 400
    mode: min
    verbose: True

model: 
  _target_: model.S4Model
  d_input:  ${dataset_specs.${dataset.name}.d_input}
  d_output: ${dataset_specs.${dataset.name}.d_output}
  d_model: 256
  N: 64 # hidden size in each SSM  
  n_layers: 4
  dropout: 0.1
  lr : ${task.lr} # S4 is a bit special in the way it treats lr, it is also needed to define the model, somehow
  prenorm:  False  
  mode: 'dplr' # <= default. Other choices: {'s4d','diag','s4', 'nplr'}

task :
  _target_: task.ClassifyTask
  model: ${model}
  lr: 0.01
  epochs : ${trainer.max_epochs}
  weight_decay: 0.0 
  criterion: "CrossEntropy" # other choices: {MSE, F1}