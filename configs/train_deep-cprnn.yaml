defaults:
  - hydra: default
  - _self_

save_dir: "logs/"
seed: 1

logger:
  _target_: lightning.pytorch.loggers.WandbLogger
  entity: guillaume-rabusseau
  project: s4-drnn-lmnist
  name: ${now:%Y-%m-%d}_${now:%H-%M-%S}
  save_dir: ${save_dir}
  offline: False
  # tags:
  #   - "exp1_p8_seeds"

dataset: 
  name: mnist  # other choice: cifar
  grayscale: true # only true makes sense for mnist
  # rescale: true # defaults to true: [0,255] -> [0,1.0]
  rescale: false # defaults to true: [0,255] -> [0,1.0]

# Dataset switch allows to keep using a single config file. Parameters below 
# are constrained given the dataset, don't change them.
dataset_specs:
  mnist: 
    datamodule_target: dataset.MNISTDataModule
    d_input: 1 # for rescale=False, this will be transformed to d_input*256
    d_output: 10
  cifar: 
    datamodule_target: dataset.CIFAR10DataModule
    d_input: ${ifelse:${dataset.grayscale},1,3}
    d_output: 10

datamodule:
  _target_: ${dataset_specs.${dataset.name}.datamodule_target}
  batch_size: 64
  num_workers: 4
  val_split: 0.1 
  grayscale: ${dataset.grayscale}
  rescale: ${dataset.rescale}

trainer:
  max_epochs: 100
  enable_progress_bar: true
  log_every_n_steps: 1
  limit_train_batches: 1.0
  # accelerator: "cpu"
  accelerator: "auto" # reflects the behaviour of S4 which uses cuda if available

callbacks:
  early_stopping:
    _target_: lightning.pytorch.callbacks.EarlyStopping
    monitor: val_loss
    patience: 400
    mode: min
    verbose: True

model: 
  _target_: model.DeepCPRNN
  d_input:  ${dataset_specs.${dataset.name}.d_input}
  embedding_dim: 64  # this replaces d_model (rescale=True means encoding, rescale=False means embedding)
  d_output: ${dataset_specs.${dataset.name}.d_output}
  hidden_size: 32 
  n_layers: 4
  dropout: 0.1
  dropout_between_layers: false # false is like CPRNN (which has no layers anyways), true is like S4
  rescale: ${dataset.rescale}

task :
  _target_: task.ClassifyTask
  model: ${model}
  lr: 0.01
  criterion: "CrossEntropy" # other choices: {MSE, F1}